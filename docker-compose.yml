services:
  mysql:
    image: mysql:8.4
    container_name: prevai_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: prevai
      MYSQL_USER: prevai
      MYSQL_PASSWORD: prevai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pprevai"]
      interval: 10s
      timeout: 5s
      retries: 10

  phi3-runner:
    build:
      context: ./model-runner/python/phi3_runner
      dockerfile: Dockerfile
    container_name: phi3_runner
    restart: unless-stopped
    environment:
      MODEL_THREADS: 4
      MODEL_CONTEXT: 2048
      MODEL_FILE: "1/Phi-3-mini-4k-instruct-q4.gguf"
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
    ports:
      - "11435:8080"
    volumes:
      - ./models:/app/models

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prevai_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      phi3-runner:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://prevai:prevai@mysql:3306/prevai
      MODEL_RUNNER_URL: http://phi3-runner:8080
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      dockerfile: ui/Dockerfile
      target: dev
    container_name: prevai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
      - /app/node_modules
    command: >
      sh -c "npm install &&
             npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  mysql_data:
